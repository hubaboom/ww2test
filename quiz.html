<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WW2 Test</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding-top:60px;
}

.quiz{
background:#1f2937;
padding:25px;
margin:auto;
max-width:500px;
border-radius:8px;
}

button{
margin-top:15px;
padding:10px 18px;
background:#ef4444;
border:none;
color:white;
font-size:16px;
cursor:pointer;
}

#jumpscare{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

#jumpscare img{
width:100%;
height:100%;
object-fit:cover;
}

</style>
</head>

<body>

<h1>WW2 Knowledge Test</h1>

<div class="quiz">

<p><b>What event started WWII?</b></p>

<label><input type="radio" name="q1"> Pearl Harbor</label><br>
<label><input type="radio" name="q1"> Germany invading Poland</label><br>
<label><input type="radio" name="q1"> Battle of Britain</label>

<br>

<button onclick="check()">Submit</button>

<p id="result"></p>

</div>

<div id="jumpscare">
<img src="scare.jpg">
<audio id="scream" src="scream.mp3"></audio>
</div>

<script>

function check(){

let q=document.getElementsByName("q1");

if(q[1].checked){

document.getElementById("result").innerHTML="Correct!";

}else{

triggerJumpscare();

}

}

function triggerJumpscare(){

let scare=document.getElementById("jumpscare");

scare.style.display="flex";

let sound=document.getElementById("scream");

sound.play();

}

</script>

</body>
</html>
